<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CineSearch — Descubra e pesquise filmes em tempo real">
  <title>CineSearch | Descubra Filmes</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <header class="header">
    <div class="container">
      <div class="header__logo">
        <span class="logo__icon">🎬</span>
        <span class="logo__text">Cine<strong>Search</strong></span>
      </div>
      <div class="header__search">
        <input 
          type="text" 
          id="search-input" 
          class="search__input" 
          placeholder="Buscar filmes..."
          autocomplete="off"
        >
        <button id="search-btn" class="search__btn">Buscar</button>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="container">

      <section class="hero" id="hero">
        <h1 class="hero__title">Descubra seu próximo filme favorito</h1>
        <p class="hero__subtitle">Pesquise entre milhares de filmes em tempo real</p>
      </section>

      <section class="filmes" id="filmes">
        <h2 class="filmes__titulo" id="section-title">🔥 Populares agora</h2>
        <div class="filmes__grid" id="filmes-grid">
          <!-- cards gerados via JS -->
        </div>
        <div class="loading" id="loading">
          <div class="spinner"></div>
        </div>
        <p class="erro" id="erro"></p>
      </section>

    </div>
  </main>

  <!-- MODAL -->
  <div class="modal" id="modal">
    <div class="modal__overlay" id="modal-overlay"></div>
    <div class="modal__content">
      <button class="modal__close" id="modal-close">✕</button>
      <div class="modal__body" id="modal-body"></div>
    </div>
  </div>

  <footer class="footer">
    <p>Dados fornecidos por <a href="https://www.themoviedb.org" target="_blank">TMDB</a></p>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
